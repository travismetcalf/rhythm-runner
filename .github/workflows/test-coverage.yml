name: Test Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm install
      
    - name: Run tests with coverage
      run: npm test -- --coverage --run
      
    - name: Generate coverage report
      run: |
        echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f coverage/coverage-summary.json ]; then
          echo "Coverage data generated successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No coverage data found" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Check coverage thresholds
      run: |
        echo "Checking coverage thresholds (60% minimum)..."
        npm test -- --coverage --run
        if [ $? -ne 0 ]; then
          echo "❌ Coverage is below threshold!"
          exit 1
        else
          echo "✅ Coverage meets minimum threshold"
        fi
    
    - name: Upload coverage to artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        if-no-files-found: ignore
        retention-days: 14
