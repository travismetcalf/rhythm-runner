name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: npm install
      
    - name: Run unit tests
      run: npm test -- --run
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Run E2E tests
      run: npm run test:e2e
      
    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.node-version }}
        path: |
          test-results/
          playwright-report/
        if-no-files-found: ignore
        retention-days: 7
    
    - name: Upload coverage reports
      if: success() && matrix.node-version == '20.x'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 14

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm install
      
    - name: Check for syntax errors
      run: |
        echo "Checking JavaScript files for syntax errors..."
        files=$(git ls-files '*.js' '*.mjs' '*.cjs')
        for file in $files; do
          node --check "$file"
        done

  # This job only runs if all tests pass
  deploy-ready:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create deployment artifact
      run: |
        mkdir -p dist
        cp -r *.js *.html *.css *.md dist/
        ls -la dist/
      
    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: production-build
        path: dist/
        retention-days: 30
    
    - name: Deployment success notification
      run: |
        echo "🚀 All tests passed! Code is ready for production deployment."
        echo "✅ Unit tests passed"
        echo "✅ E2E tests passed"
        echo "✅ Code quality checks passed"

  # Branch protection simulation
  status-check:
    name: Required Status Check
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
          echo "❌ Tests failed. Cannot promote to production."
          exit 1
        else
          echo "✅ All checks passed. Safe to merge/deploy."
        fi
